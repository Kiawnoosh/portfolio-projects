<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <title>Word Counter</title>
</head>
<body>

    <div class="title_div">
        <p class="title_text"><strong>WORD</strong> COUNTER</p>
        <p class="creator">Kiawnoosh</p>
    </div>
    <div class="main_work">
        <textarea class="textEl" placeholder="enter something..."></textarea>
        <div class="counter_sec">
            <div class="item word_counter">
                <p class="word_counter_text">0</p>
                <p>Words</p>
            </div>
            <div class="item character_counter">
                <p class="character_counter_text">0</p>
                <p>Character</p>
            </div>
             <div class="item x_counter">
                <p class="x_counter_text">-280</p>
                <p>X</p>
            </div>
             <div class="item instagram_counter">
                <p class="instagram_counter_text">2,200 </p>
                <p>Instagram</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
